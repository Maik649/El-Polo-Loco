<!DOCTYPE html>
<html lang="de" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Polo Loco</title>
    <link rel="icon" type="image/png" href="./assets/favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicons/favicon.svg" />
    <link rel="shortcut icon" href="./assets/favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="El Polo Loco" />
    <link rel="manifest" href="./assets/favicons/site.webmanifest" />
    <link rel="stylesheet" href="legal-page.css">
    <link rel="stylesheet" href="font.css">
    <link rel="stylesheet" href="style.css">

    <script src="./js/classes/drawable-objekts.class.js"></script>
    <script src="./js/classes/moveable-objekt.class.js"></script>
    <script src="./js/classes/chicken.class.js"></script>
    <script src="./js/classes/chicken-small.class.js"></script>
    <script src="./js/classes/endboss.class.js"></script>
    <script src="./js/classes/cloud.class.js"></script>
    <script src="./js/classes/backround-objekts.class.js"></script>
    <script src="./js/classes/world.class.js"></script>
    <script src="./js/classes/character.class.js"></script>
    <script src="./js/classes/kayboard.class.js"></script>
    <script src="./js/classes/level.class.js"></script>
    <script src="./js/classes/status-bar.class.js"></script>
    <script src="./js/classes/throwable-objekts.class.js"></script>
    <script src="./js/classes/collectebil-objeks.js"></script>
    <script src="./js/classes/screen-class.js"></script>
    <script src="./js/classes/sound.class.js"></script>
    <script src="./js/classes/mobil.screen.class.js"></script>
    <script src="./js/level/level_1.js"></script>
    <script src="./js/game.js"></script>
</head>
<body onload="init()">
    <div id="gameContainer" class="game-container">
        <button id="backToStartBtn" class="back-to-start-btn" type="button">Back to Start</button>
        <button id="nochmalBtn" class="nochmal-btn" type="button">Reset</button>
        <h1>El Polo Loco</h1>
        <canvas id="gameCanvas" width="720" height="480"></canvas>
        <div class="mobile-controls">
            <div class="mobile-controls-group">
                <button id="btn-left" class="mobile-btn" type="button">◀</button>
                <button id="btn-right" class="mobile-btn" type="button">▶</button>
            </div>
            <div class="mobile-controls-group">
                <button id="btn-jump" class="mobile-btn" type="button">⤒</button>
                <button id="btn-throw" class="mobile-btn" type="button"><img src="./assets/img/6_salsa_bottle/salsa_bottle.png" alt="salsa_bottle.png"></button>
            </div>
        </div>

        <div id="orientationOverlay">
            <div class="orientation-message">
                <p>Bitte drehe dein Handy ins Querformat, um zu spielen.</p>
            </div>
        </div>
    </div>

</body>
</html>
