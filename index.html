<!DOCTYPE html>
<html lang="de" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="./js/classes/drawable-objekts.class.js"></script>
    <script src="./js/classes/moveable-objekt.class.js"></script>
    <script src="./js/classes/chicken.class.js"></script>
    <script src="./js/classes/chicken-small.class.js"></script>
    <script src="./js/classes/endboss.class.js"></script>
    <script src="./js/classes/cloud.class.js"></script>
    <script src="./js/classes/backround-objekts.class.js"></script>
    <script src="./js/classes/world.class.js"></script>
    <script src="./js/classes/character.class.js"></script>
    <script src="./js/classes/kayboard.class.js"></script>
    <script src="./js/classes/level.class.js"></script>
    <script src="./js/classes/status-bar.class.js"></script>
    <script src="./js/classes/throwable-objekts.class.js"></script>
    <script src="./js/classes/collectebil-objeks.js"></script>
    <script src="./js/level/level_1.js"></script>
    <script src="./js/game.js"></script>
</head>
<body onload="init()">
    <div id="gameContainer" class="game-container">
        <h1>El Polo Loco</h1>
        <canvas id="gameCanvas" width="720" height="480"></canvas>
        <!-- Mobile-Steuerung -->
        <div class="mobile-controls">
            <div class="mobile-controls-group">
                <button id="btn-left" class="mobile-btn">◀</button>
                <button id="btn-right" class="mobile-btn">▶</button>
            </div>
            <div class="mobile-controls-group">
                <button id="btn-jump" class="mobile-btn">⤒</button>
                <button id="btn-throw" class="mobile-btn"><img src="./assets/img/6_salsa_bottle/salsa_bottle.png" alt="salsa_bottle.png"></button>
            </div>
        </div>
    </div>

    <div id="orientationOverlay">
        <div class="orientation-message">
            <p>Bitte drehe dein Handy ins Querformat, um zu spielen.</p>
        </div>
    </div>

</body>
</html>
